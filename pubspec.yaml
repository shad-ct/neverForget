name: neverforget
description: "A Glassmorphic Special Day Reminder App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # State Management
  provider: ^6.1.2

  # Notifications & Scheduling
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Persistence (Settings)
  shared_preferences: ^2.3.4

  # UI - Performance Pseudo-Glassmorphism
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Isar Code Generation
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - lib/models/data.json
    - lib/wallpapers/
